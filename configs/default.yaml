seed: 42
data_dir: data
source_domains: [FD001, FD002, FD003]
target_domain: FD004
window_size: 50
window_stride: 5
rul_cap: 125
sensor_columns: [s2, s3, s4, s7, s8, s9, s11, s12, s13, s14, s15, s17, s20, s21]
normalization: zscore
target_support_units: 5
target_support_ratio: null
validation_fraction: 0.2
model: meta_gnn
hidden_dim: 128
embedding_dim: 256
gat_heads: 4
