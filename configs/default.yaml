graph_k: 5
graph_method: cosine
dtw_downsample: 5
pair_aux_weight: 0.01
batch_size: 64
epochs: 50
learning_rate: 0.001
weight_decay: 0.0001
meta_epochs: 100
tasks_per_meta_batch: 3
